syntax = "proto3";

package meter.v1;

import "google/protobuf/empty.proto";

message Meter {
    string id = 1;
    string line_name = 2;
    string model_name = 3;
}

message Line {
    string name = 1;
    repeated Meter meters = 2;
}

message AddMeterRequest {
    string meter_id = 1;
}

message AddMeterResponse {
    Meter meter_id = 1;
}

message ListAvailableMetersRequest {
    string line_name = 1;
}

message ListAvailableMetersResponse {
    repeated Meter meters = 1;
}

message ListAllAvailableMetersResponse {
    repeated Line line_meters = 1;
}

message ListCreatedMetersRequest {
    string line_name = 1;
}

message ListCreatedMetersResponse {
    repeated Meter meters = 1;
}


message ListLinesResponse {
    repeated string lines = 1;
}

message RemoveMeterRequest {
    string meter_id = 1;
}

message RemoveMeterResponse {
    string result = 1;
}

message ListAllCreatedMetersResponse {
    repeated Line line_meters = 1;
}

message GetMeasurementsPhasesRequest {
    string meter_id = 1;
}

message GetMeasurementsPhasesResponse {
    repeated string measurements_values = 1;
}


service MeterService {
    rpc AddMeter (AddMeterRequest) returns (AddMeterResponse);
    rpc ListAvailableMeters (ListAvailableMetersRequest) returns (ListAvailableMetersResponse); 
    rpc ListAllAvailableMeters (google.protobuf.Empty) returns (ListAllAvailableMetersResponse); 
    rpc ListCreatedMeters (ListCreatedMetersRequest) returns (ListCreatedMetersResponse); 
    rpc ListLines (google.protobuf.Empty) returns (ListLinesResponse);
    rpc RemoveMeter (RemoveMeterRequest) returns (RemoveMeterResponse);
    rpc ListAllCreatedMeters (google.protobuf.Empty) returns (ListAllCreatedMetersResponse);
    rpc GetMeasurementsPhases (GetMeasurementsPhasesRequest) returns (GetMeasurementsPhasesResponse);
}
